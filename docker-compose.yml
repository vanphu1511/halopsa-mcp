services:
  halopsa-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/wyre-technology/halopsa-mcp:latest
    container_name: halopsa-mcp-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - HALOPSA_CLIENT_ID=${HALOPSA_CLIENT_ID}
      - HALOPSA_CLIENT_SECRET=${HALOPSA_CLIENT_SECRET}
      - HALOPSA_TENANT=${HALOPSA_TENANT}
      - MCP_TRANSPORT=http
      - AUTH_MODE=env
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes: {}
