spec:
  name: halopsa-mcp
  services:
    - name: halopsa-mcp
      github:
        repo: wyre-technology/halopsa-mcp
        branch: main
        deploy_on_push: true
      dockerfile_path: Dockerfile
      http_port: 8080
      instance_count: 1
      instance_size_slug: basic-xxs
      health_check:
        http_path: /health
        initial_delay_seconds: 10
        period_seconds: 30
        timeout_seconds: 10
        success_threshold: 1
        failure_threshold: 3
      envs:
        - key: HALOPSA_CLIENT_ID
          scope: RUN_TIME
          type: SECRET
        - key: HALOPSA_CLIENT_SECRET
          scope: RUN_TIME
          type: SECRET
        - key: HALOPSA_TENANT
          scope: RUN_TIME
          type: SECRET
        - key: MCP_TRANSPORT
          scope: RUN_TIME
          value: http
        - key: AUTH_MODE
          scope: RUN_TIME
          value: env
        - key: NODE_ENV
          scope: RUN_TIME
          value: production
        - key: LOG_LEVEL
          scope: RUN_TIME
          value: info
